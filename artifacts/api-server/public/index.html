<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site com Atualização em Tempo Real</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    header {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
    }
    header h1 { font-size: 1.2rem; letter-spacing: 1px; }
    header a {
      color: #a8dadc;
      text-decoration: none;
      font-size: 0.9rem;
    }
    main {
      margin-top: 80px;
      width: 100%;
      max-width: 860px;
      padding: 40px 24px;
    }
    .hero {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 32px;
    }
    .hero img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 28px;
      display: none;
    }
    .hero img.loaded { display: block; }
    #titulo {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 16px;
      transition: all 0.4s ease;
    }
    #descricao {
      font-size: 1.1rem;
      color: #555;
      max-width: 600px;
      line-height: 1.7;
      margin-bottom: 32px;
      transition: all 0.4s ease;
    }
    #botao {
      background: #e63946;
      color: #fff;
      border: none;
      padding: 14px 40px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }
    #botao:hover { background: #c1121f; transform: scale(1.04); }
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      color: #a8dadc;
      padding: 8px 20px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f00;
      display: inline-block;
      transition: background 0.3s;
    }
    .dot.connected { background: #4caf50; }
    .flash {
      animation: flash 0.6s ease;
    }
    @keyframes flash {
      0%   { background: #fff3cd; }
      100% { background: transparent; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Site em Tempo Real</h1>
    <a href="/admin.html">Painel Admin</a>
  </header>

  <main>
    <div class="hero">
      <img id="imagem" src="" alt="Imagem do conteúdo" />
      <h2 id="titulo">Carregando...</h2>
      <p id="descricao"></p>
      <button id="botao"></button>
    </div>
  </main>

  <div class="status-bar">
    <span class="dot" id="dot"></span>
    <span id="status-text">Conectando ao servidor...</span>
  </div>

  <script src="/api/socket.io/socket.io.js"></script>
  <script src="/script.js"></script>
</body>
</html>
